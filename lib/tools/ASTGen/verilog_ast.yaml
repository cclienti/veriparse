#
# AST description for the ASTGen code generator.
#
# This schema implements ADR-0001 — Type / Declaration split. The two orthogonal
# abstractions are:
#
#   * DataType   — a NAMELESS description of a type (built-in keyword, named ref,
#                  struct/union/enum, ...). Carries only what is intrinsic to the
#                  type: `signing` and `packed_dims`. Discrimination is by node
#                  type (LogicType/IntType/NamedType/...), never a `kind` enum.
#   * Declaration — binds a NAME (and a role) to a DataType, plus site-specific
#                  extras (unpacked dims, init/default, direction, qualifiers, net
#                  strength/delays). Var/Net/Param/Arg/Member/Typedef/...
#
# Packed dimensions belong to the type; unpacked dimensions to the declaration.
# "Implicit is explicit": no type keyword written -> ImplicitType (never a
# fabricated Logic). A resolution pass turns ImplicitType/NamedType into a
# concrete type.
#
# NOTE (phased, ADR-0001 §10): module-like definitions (Interface/Class/Program),
# their DataType variants (InterfaceType/ClassType/CovergroupType), Modport and
# Constraint are part of the model but are added when their grammar is wired up —
# additively, no redesign. `NetTypeDecl` (user-defined nettype) is realized now in
# this schema (ADR-0001 §8/§10); only its grammar is wired up later. The value-side
# scope migration is DONE: Identifier — and Call/FunctionCall/TaskCall, which now
# inherit it — carry `scope: list(ScopeName)` for the SV `::` axis and `hier` for
# the Verilog `.` axis; the old flat `package` string is gone.

#####################################################################
# Top level
#####################################################################

Source:
  properties:
  children:
    description: Description

Description:
  properties:
  children:
    definitions: list(Node)

Pragmalist:
  properties:
  children:
    pragmas: list(Pragma)
    statements: list(Node)

Pragma:
  properties:
    name: "std::string"
  children:
    expression: Node

#####################################################################
# Module / ports / package
#####################################################################

Module:
  properties:
    name: "std::string"
    # Module default lifetime (`module automatic m;`). NONE = unspecified (static).
    lifetime: enum(NONE, AUTOMATIC, STATIC)
    # `default_nettype directive: a net-type keyword tag or NONE. The legacy
    # INTEGER/REAL/REG values are gone (ADR-0001 §9.6) — only real net types remain.
    default_nettype: enum(WIRE, TRI, TRI0, TRI1, TRIAND, TRIOR, TRIREG, WAND, WOR, UWIRE, SUPPLY0, SUPPLY1, NONE)
  children:
    # #(...) parameter ports: Param | TypeParam (both Declaration).
    params: list(Declaration)
    # Module port list: Port nodes (ANSI typed ports, or name-only non-ANSI refs).
    ports: list(Port)
    items: list(Node)

# A module port. ADR-0001 §4/§5.3 — a port is a directed declaration (wrapper):
#   * ANSI typed port (`input logic [7:0] p`): direction set + `decl` holds the
#     inner Var/Net (its name/type carry the port's name/type; Port.name empty).
#   * non-ANSI header ref (`module m(a, b)`): name-only, direction NONE, decl null;
#     a pass merges it with the body direction/net/var declarations.
#   * explicit ANSI connection (`.p(expr)`): name p + `expr` set, decl null.
Port:
  properties:
    name: "std::string"
    direction: enum(NONE, INPUT, OUTPUT, INOUT, REF, CONST_REF)
  children:
    decl: Declaration
    expr: Node

Package:
  properties:
    name: "std::string"
    lifetime: enum(NONE, AUTOMATIC, STATIC) # default lifetime; NONE = unspecified (static)
  children:
    items: list(Node)

Import:
  properties:
    package: "std::string" # package name, left of ::
    symbol: "std::string"  # imported item; "*" for a wildcard import
  children:

#####################################################################
# Identifiers and constants
#####################################################################

Identifier:
  properties:
    name: "std::string"
  children:
    # SV `::` scope-resolution (pkg::name, $unit::name, A::B::name, A#(8)::name);
    # empty if unscoped. SAME model as NamedType.scope (the `::` axis is uniform
    # for types and values). A resolution pass (PackageInliner) consumes it.
    scope: list(ScopeName)
    # Verilog `.` hierarchical reference path (top.u1.sig, genblk[i].sig) — a path
    # through the instance/generate hierarchy. Orthogonal to `scope`, value-side
    # only. Renamed from the old IdentifierScope (ADR-0001 §3.3.1).
    hier: HierName

# A subroutine call: a scoped/hierarchical name (name/scope/hier from Identifier)
# plus an argument list. The task-vs-function split is NOT syntactic — the SV BNF
# `tf_call` is task-OR-function, and §13.4.1 lets a function be called as a
# statement (`void'(f())` or with a warning). So a bare statement call `f();` is
# a neutral `Call` (unresolved); a call in EXPRESSION position (or under a void
# cast) is a `FunctionCall` (necessarily a function); a `TaskCall` is the
# known-task form a symbol-aware resolution pass produces. Rendering is
# position-driven, so all three round-trip as `name(args)` identically.
Call:
  inherit: Identifier
  children:
    args: list(Node)

Constant:
  properties:
  children:

StringConst:
  inherit: Constant
  properties:
    value: "std::string"
  children:

IntConst:
  inherit: Constant
  properties:
    value: "std::string"
  children:

IntConstN:
  inherit: Constant
  includes: ["veriparse/misc/bignum.hpp"]
  properties:
    base: int
    size: int
    sign: bool
    value: mpz_class
  children:

FloatConst:
  inherit: Constant
  properties:
    value: double
  children:

#####################################################################
# DataType hierarchy (nameless) — ADR-0001 §3
#####################################################################

# Abstract base of every type. `signing` is tri-state (preserve what was written;
# the default is resolved by a pass). `packed_dims` are the [..] dims of the type.
# Both are inert (NONE / empty) on the types where they do not apply (atoms have
# no packed dims, named/real types no signing) — zero cost, uniform access.
DataType:
  properties:
    signing: enum(NONE, SIGNED, UNSIGNED)
  children:
    packed_dims: list(Dimension)

# Integer vector types (signing + packed relevant).
LogicType: {inherit: DataType}
RegType:   {inherit: DataType}
BitType:   {inherit: DataType}

# Integer atom types (signing relevant; packed inert).
ByteType:     {inherit: DataType}
ShortintType: {inherit: DataType}
IntType:      {inherit: DataType}
LongintType:  {inherit: DataType}
IntegerType:  {inherit: DataType}
TimeType:     {inherit: DataType}

# Non-integer types (signing + packed inert).
RealType:     {inherit: DataType}
ShortrealType: {inherit: DataType}
RealtimeType: {inherit: DataType}
StringType:   {inherit: DataType}
ChandleType:  {inherit: DataType}
EventType:    {inherit: DataType}

# No type keyword written. The implied type (logic) is resolved by a pass. Used
# by `var a`, `var [3:0] a`, `wire [3:0] w` (net with no data_type), an untyped
# parameter, an implicit port.
ImplicitType: {inherit: DataType}

# `void` return / absence of a return type.
VoidType: {inherit: DataType}

# A reference to a user-defined (named/typedef) type: `my_t`, `pkg::T`, `A::B::T`.
# Takes over the old CustomType. `scope` is an ordered scope list (one segment per
# `::` step), empty when unscoped; `packed_dims` (inherited) carry the [..] after
# a named type (`my_t [3:0]`). A resolution pass replaces it with the concrete
# underlying type. NOT used for built-in keywords, and NOT the SV type() operator
# (that is TypeOpExpr/TypeOpType).
NamedType:
  inherit: DataType
  properties:
    name: "std::string"
  children:
    scope: list(ScopeName)

# A `::` scope segment of a scope list. `params` carries a parameterized class
# scope (`A#(8)::T`), null for a package / $unit segment.
ScopeName:
  properties:
    name: "std::string"
  children:
    params: list(ParamArg)

# struct { .. } — `is_packed` is the packed-vs-unpacked layout (distinct from the
# inherited packed_dims). `signing` (inherited) covers `struct packed signed`.
StructType:
  inherit: DataType
  properties:
    is_packed: bool
  children:
    members: list(Member)

# union { .. } — `is_tagged` is `union tagged`.
UnionType:
  inherit: DataType
  properties:
    is_packed: bool
    is_tagged: bool
  children:
    members: list(Member)

# enum base { items } — `base` is the underlying DataType (null = unspecified),
# `items` the enumerators. The optional packed_dims (inherited) carry `[..]`.
EnumType:
  inherit: DataType
  children:
    base: DataType
    items: list(EnumItem)

# An enumerator. The SV `enum { A[3:0], B }` form names a RANGE of members:
# `range` reuses a Dimension (`A[4]` -> SizeDim(4), `A[3:0]` -> RangeDim(3,0)),
# null for the plain form. `value` is the optional `= expr`.
EnumItem:
  properties:
    name: "std::string"
  children:
    value: Node
    range: Dimension

# SV type() operator, node per form (consistent with the Cast split):
#   type(expr)      -> TypeOpExpr{ expr }
#   type(data_type) -> TypeOpType{ arg_type }
# Distinct from NamedType. Not parsed yet; the model provides for it.
# NOTE: the ADR-0001 §3.6 spelling is `type`, but `type` is reserved by the
# ASTGen templates (the per-field C++-type loop variable, `{% for name, type in
# properties_dict_full.items() %}` in node_header.hpp.j2 / node_impl.cpp.j2), so
# the child is named `arg_type` here. (Same class as `Arg.default_value`, which
# avoids the C++ keyword `default`.)
TypeOpExpr:
  inherit: DataType
  children:
    expr: Node

TypeOpType:
  inherit: DataType
  children:
    arg_type: DataType

#####################################################################
# Dimensions (node per form) — ADR-0001 §3.8. Replaces Width / Length.
# Used for packed (DataType.packed_dims) and unpacked
# (Declaration.unpacked_dims); the context decides what is legal.
#####################################################################

Dimension:
  properties:
  children:

# [L:R] range; ascending/descending order preserved.
RangeDim:
  inherit: Dimension
  children:
    left: Node
    right: Node

# [N] size, equivalent to [0:N-1]; round-trips "[4]".
SizeDim:
  inherit: Dimension
  children:
    size: Node

# [] dynamic array.
UnsizedDim: {inherit: Dimension}

# [$] | [$:N] queue (bound null for [$]).
QueueDim:
  inherit: Dimension
  children:
    bound: Node

# [index_type] | [*] associative (index_type null for '*').
AssocDim:
  inherit: Dimension
  children:
    index_type: DataType

#####################################################################
# Declaration hierarchy — ADR-0001 §4
#####################################################################

# Abstract base: binds a `name` to a `type` (DataType). For a forward typedef the
# type is null; for Port the name/type are delegated to its inner decl.
Declaration:
  properties:
    name: "std::string"
  children:
    type: DataType

# data_declaration: a variable. `is_var`/`is_const` are the SV qualifiers,
# `lifetime` the static/automatic lifetime. `unpacked_dims` the [..] after the
# name, `init` the initializer.
Var:
  inherit: Declaration
  properties:
    is_var: bool
    is_const: bool
    lifetime: enum(NONE, AUTOMATIC, STATIC)
  children:
    unpacked_dims: list(Dimension)
    init: Rvalue

# net_declaration base (node per net-type below). The net's signing and data type
# live on the inherited `type` (ImplicitType when no data_type written).
# `cont_assign` is the optional continuous assignment (`wire w = e`); `strength`
# the optional drive/charge strength; `is_vectored`/`is_scalared` the
# vectored/scalared qualifiers; `ldelay`/`rdelay` the net delays.
Net:
  inherit: Declaration
  properties:
    is_vectored: bool
    is_scalared: bool
  children:
    unpacked_dims: list(Dimension)
    cont_assign: Rvalue
    strength: Strength
    ldelay: DelayStatement
    rdelay: DelayStatement

# The 12 IEEE net_type keywords (tags -> nodes, like LogicType/IntType).
WireNet:    {inherit: Net}
TriNet:     {inherit: Net}
Tri0Net:    {inherit: Net}
Tri1Net:    {inherit: Net}
TriandNet:  {inherit: Net}
TriorNet:   {inherit: Net}
TriregNet:  {inherit: Net}
WandNet:    {inherit: Net}
WorNet:     {inherit: Net}
UwireNet:   {inherit: Net}
Supply0Net: {inherit: Net}
Supply1Net: {inherit: Net}

# interconnect net (`interconnect [3:0] io;`).
InterconnectNet: {inherit: Net}

# A net of a user-defined nettype: the nettype reference is the inherited `type`
# (a NamedType). That named member is why nets are node-per-type, not an enum.
UserNet: {inherit: Net}

# No net keyword written (a port default); a pass resolves the concrete net-type
# via `default_nettype. Parallel to ImplicitType.
ImplicitNet: {inherit: Net}

# User-defined nettype DECLARATION (`nettype logic [7:0] my_net_t;`, optionally
# `... with resolver_fn;`, IEEE 1800-2017 §6.6.7). Declares a new nettype NAME
# aliasing a DataType (the inherited `type`); `resolver` is the optional
# resolution-function reference (null if absent). USING the nettype is
# UserNet + NamedType; this is the declaration form.
NetTypeDecl:
  inherit: Declaration
  children:
    resolver: Identifier

# Net strength, node per form (no kind enum).
Strength:
  properties:
  children:

DriveStrength:
  inherit: Strength
  properties:
    s0: enum(SUPPLY0, STRONG0, PULL0, WEAK0, HIGHZ0)
    s1: enum(SUPPLY1, STRONG1, PULL1, WEAK1, HIGHZ1)

ChargeStrength:
  inherit: Strength
  properties:
    charge: enum(SMALL, MEDIUM, LARGE)

# parameter / localparam value parameter. `is_local` distinguishes localparam.
# `value` is the default (null on a param-port overridden at instantiation);
# `unpacked_dims` covers array parameters (`parameter int N [4]`).
Param:
  inherit: Declaration
  properties:
    is_local: bool
  children:
    value: Node
    unpacked_dims: list(Dimension)

# parameter type T = <default> — the inherited `type` is the default DataType
# (null when no default, `parameter type U;`). `is_local` for `localparam type`.
TypeParam:
  inherit: Declaration
  properties:
    is_local: bool

# typedef. The inherited `type` is the aliased DataType; `type == null` marks a
# FORWARD typedef and `fwd_kind` is its optional kind hint (`typedef class C;`,
# `typedef enum E;`, or bare `typedef foo_t;` with fwd_kind NONE).
# `unpacked_dims` covers `typedef logic [7:0] mem_t [256]`.
Typedef:
  inherit: Declaration
  properties:
    fwd_kind: enum(NONE, ENUM, STRUCT, UNION, CLASS, INTERFACE_CLASS)
  children:
    unpacked_dims: list(Dimension)

# struct/union member declaration.
Member:
  inherit: Declaration
  children:
    unpacked_dims: list(Dimension)
    init: Rvalue

# task/function argument. `direction` defaults to input; `is_var` for an explicit
# `var` qualifier; `unpacked_dims` the array dims; `default_value` the default
# (`default` is a C++ keyword, hence the name).
Arg:
  inherit: Declaration
  properties:
    is_var: bool
    direction: enum(INPUT, OUTPUT, INOUT, REF, CONST_REF)
  children:
    unpacked_dims: list(Dimension)
    default_value: Node

# genvar: compile-time, untyped (always integer) — deliberately NOT a Declaration
# (no type slot).
Genvar:
  properties:
    name: "std::string"

#####################################################################
# Expressions
#####################################################################

Concat:
  properties:
  children:
    list: list(Node)

Lconcat: {inherit: Concat}

Repeat:
  properties:
  children:
    value: Node
    times: Node

# SystemVerilog assignment pattern `'{ ... }` (struct/array literal). `items`
# are positional expressions or keyed `PatternItem` entries; `times` holds the
# replication count of the `'{N{...}}` form (null for the plain form).
AssignmentPattern:
  properties:
  children:
    items: list(Node)
    times: Node

# A keyed entry `key : value` in an assignment pattern. `is_default` marks the
# `default : value` form (key is then null); otherwise key is a member name
# (Identifier), an index (expression), or a type name.
PatternItem:
  properties:
    is_default: bool
  children:
    key: Node
    value: Node

# SystemVerilog cast, node per form (ADR-0001 §5.11) — each slot well-typed:
#   int'(x)      -> TypeCast{ target: IntType, expr }
#   8'(x)        -> SizeCast{ size: 8, expr }
#   signed'(x)   -> SigningCast{ signing: SIGNED, expr }
#   const'(x)    -> ConstCast{ expr }
Cast:
  properties:
  children:
    expr: Node

TypeCast:
  inherit: Cast
  children:
    target: DataType

SizeCast:
  inherit: Cast
  children:
    size: Node

SigningCast:
  inherit: Cast
  properties:
    signing: enum(SIGNED, UNSIGNED)

ConstCast:
  inherit: Cast

Indirect:
  properties:
  children:
    var: Node

Partselect:
  inherit: Indirect
  properties:
  children:
    msb: Node
    lsb: Node

PartselectIndexed:
  inherit: Indirect
  properties:
  children:
    index: Node
    size: Node

PartselectPlusIndexed:  {inherit: PartselectIndexed}
PartselectMinusIndexed: {inherit: PartselectIndexed}

Pointer:
  inherit: Indirect
  properties:
  children:
    ptr: Node

Lvalue:
  properties:
  children:
    var: Node

Rvalue:
  properties:
  children:
    var: Node

UnaryOperator:
  properties:
  children:
    right: Node

Uplus:  {inherit: UnaryOperator}
Uminus: {inherit: UnaryOperator}
Ulnot:  {inherit: UnaryOperator}
Unot:   {inherit: UnaryOperator}
Uand:   {inherit: UnaryOperator}
Unand:  {inherit: UnaryOperator}
Uor:    {inherit: UnaryOperator}
Unor:   {inherit: UnaryOperator}
Uxor:   {inherit: UnaryOperator}
Uxnor:  {inherit: UnaryOperator}

Operator:
  properties:
  children:
    left: Node
    right: Node

Power:       {inherit: Operator}
Times:       {inherit: Operator}
Divide:      {inherit: Operator}
Mod:         {inherit: Operator}
Plus:        {inherit: Operator}
Minus:       {inherit: Operator}
Sll:         {inherit: Operator}
Srl:         {inherit: Operator}
Sra:         {inherit: Operator}
LessThan:    {inherit: Operator}
GreaterThan: {inherit: Operator}
LessEq:      {inherit: Operator}
GreaterEq:   {inherit: Operator}
Eq:          {inherit: Operator}
NotEq:       {inherit: Operator}
Eql:         {inherit: Operator}
NotEql:      {inherit: Operator}
And:         {inherit: Operator}
Xor:         {inherit: Operator}
Xnor:        {inherit: Operator}
Or:          {inherit: Operator}
Land:        {inherit: Operator}
Lor:         {inherit: Operator}

Cond:
  inherit: Operator
  properties:
  children:
    cond: Node
    # left is true
    # right is false

#####################################################################
# Statements
#####################################################################

Always:
  properties:
  children:
    senslist: Senslist
    statement: Node

AlwaysFF:    {inherit: Always}
AlwaysComb:  {inherit: Always}
AlwaysLatch: {inherit: Always}

Senslist:
  properties:
  children:
    list: list(Sens)

Sens:
  properties:
    type: enum(All, Posedge, Negedge, None)
  children:
    sig: Node

Defparamlist:
  properties:
  children:
    list: list(Defparam)

Defparam:
  properties:
  children:
    identifier: Identifier
    right: Rvalue # an expression

Assign:
  properties:
  children:
    left: Lvalue
    right: Rvalue
    ldelay: DelayStatement
    rdelay: DelayStatement

BlockingSubstitution:    {inherit: Assign}
NonblockingSubstitution: {inherit: Assign}

IfStatement:
  properties:
  children:
    cond: Node
    true_statement: Node
    false_statement: Node

RepeatStatement:
  properties:
  children:
    times: Node
    statement: Node

ForStatement:
  properties:
  children:
    pre: BlockingSubstitution
    cond: Node
    post: BlockingSubstitution
    statement: Node

WhileStatement:
  properties:
  children:
    cond: Node
    statement: Node

CaseStatement:
  properties:
  children:
    comp: Node
    caselist: list(Case)

CasexStatement: {inherit: CaseStatement}
CasezStatement: {inherit: CaseStatement}
UniqueCaseStatement:   {inherit: CaseStatement}
PriorityCaseStatement: {inherit: CaseStatement}

Case:
  properties:
  children:
    cond: list(Node)
    statement: Node

Block:
  properties:
    scope: "std::string"
  children:
    statements: list(Node)

Initial:
  properties:
  children:
    statement: Node

EventStatement:
  properties:
  children:
    senslist: Senslist
    statement: Node

WaitStatement:
  properties:
  children:
    cond: Node
    statement: Node

ForeverStatement:
  properties:
  children:
    statement: Node

DelayStatement:
  properties:
  children:
    delay: Node

#####################################################################
# Instances, functions, tasks, generate, misc
#####################################################################

Instancelist:
  properties:
    module: "std::string"
  children:
    parameterlist: list(ParamArg)
    instances: list(Instance)

Instance:
  properties:
    module: "std::string"
    name: "std::string"
  children:
    array: Dimension # instance-array range (was Length)
    parameterlist: list(ParamArg)
    portlist: list(PortArg)

ParamArg:
  properties:
    name: "std::string"
  children:
    value: Node

PortArg:
  properties:
    name: "std::string"
  children:
    value: Node

# A function. `return_type` is the single DataType return (VoidType for `void`,
# ImplicitType for an implicit 1-bit return). `args` are the typed arguments.
Function:
  properties:
    name: "std::string"
    lifetime: enum(NONE, AUTOMATIC, STATIC)
  children:
    return_type: DataType
    args: list(Arg)
    statements: list(Node)

# A call KNOWN to be a function: expression position (tasks cannot be operands)
# or under a void cast `void'(f())`. name/scope/hier from Identifier, args from Call.
FunctionCall:
  inherit: Call

Task:
  properties:
    name: "std::string"
    lifetime: enum(NONE, AUTOMATIC, STATIC)
  children:
    args: list(Arg)
    statements: list(Node)

# A call KNOWN to be a task — produced by a symbol-aware resolution pass; the bare
# parser emits a neutral Call for ambiguous statement calls. From Call/Identifier.
TaskCall:
  inherit: Call

GenerateStatement:
  properties:
  children:
    items: list(Node)

SystemCall:
  properties:
    syscall: "std::string"
  children:
    args: list(Node)

# A single segment of a Verilog hierarchical reference (top.u1.sig, genblk[i].sig):
# `name` is the segment identifier, `loop` the optional array index. Renamed from
# IdentifierScopeLabel — the SV `::` axis now owns the field name `scope`
# (ADR-0001 §3.3.1), so the hierarchical segment's identifier is honestly `name`.
HierLabel:
  properties:
    name: "std::string"
  children:
    loop: Node

# A Verilog hierarchical reference path: an ordered list of HierLabel segments.
# Renamed from IdentifierScope.
HierName:
  properties:
  children:
    labellist: list(HierLabel)

# disable <name>; — the target is a (possibly hierarchical) block/task name, so it
# is an Identifier (carrying hier/scope), not a flat string.
Disable:
  properties:
  children:
    dest: Identifier

ParallelBlock:
  properties:
    scope: "std::string"
  children:
    statements: list(Node)

SingleStatement:
  properties:
    scope: "std::string"
  children:
    statement: Node
    delay: DelayStatement
