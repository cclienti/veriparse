# Steer conda-build's {{ compiler() }} and {{ stdlib() }} macros to the
# MinGW toolchain on Windows. GMP's autotools build is incompatible with
# MSVC, so the entire stack uses MinGW.

c_compiler:        # [win]
  - gcc            # [win]
cxx_compiler:      # [win]
  - gxx            # [win]
c_stdlib:          # [win]
  - m2w64-sysroot  # [win]
