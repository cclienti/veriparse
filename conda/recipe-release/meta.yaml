package:
  name: veriparse
  version: {{ environ.get('GIT_DESCRIBE_TAG', '') }}

source:
  path: ../..

build:
  number: 0
  ignore_run_exports:
    - gtest

requirements:
  host:
    - flex=2.6.4              # [not win]
    - winflexbison            # [win]
    - gtest=1.17.0
    - libboost-devel=1.90.0
    - yaml-cpp=0.8.0

  run:
    - libboost-devel=1.90.0
    - yaml-cpp=0.8.0

  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - ninja            # [not win]
    - make             # [not win]
    - mold             # [linux]
    - flex=2.6.4       # [not win]
    - bison=3.8.2      # [not win]
    - winflexbison     # [win]
    - libboost-devel=1.90.0
    - yaml-cpp=0.8.0
    - gtest=1.17.0
    # AST code generation (lib/tools/ASTGen/astgen.py). Also pulled into the
    # dev env by `make dev-env-file`, which feeds `make ast-gen` / `ast-check`.
    # NOTE: clang-format output is version-sensitive — if its version changes,
    # the committed generated AST tree must be regenerated to match.
    - python
    - jinja2
    - pyyaml
    - clang-format

about:
  home: https://www.wavecruncher.net
  license: LGPL-3.0-only
  license_file: ../../LICENSE
  summary: Verilog Design Flattenner and Obfuscater.

test:
  commands:
    - veriparse -h
    - veriflat -h
    - veriobf -h
