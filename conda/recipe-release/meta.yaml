package:
  name: veriparse
  version: {{ environ.get('GIT_DESCRIBE_TAG', '') }}

source:
  path: ../..

build:
  number: 0
  ignore_run_exports:
    - gtest

requirements:
  host:
    # GMP is built from source via ExternalProject (cmake/external_gmp.cmake)
    # so it is intentionally not listed here. See that file for the rationale.
    - flex=2.6.4       # [not win]
    - winflexbison     # [win]
    - gtest=1.17.0
    - boost=1.85.0
    - yaml-cpp=0.8.0

  run:
    # GMP shared lib is bundled in the package (via install rule).
    - boost=1.85.0
    - yaml-cpp=0.8.0

  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - cmake
    - mold             # [not win]
    # Autotools toolchain to build GMP. The m2-* variants are MSYS2 builds
    # used inside conda-build's Windows env.
    - make             # [not win]
    - autoconf         # [not win]
    - automake         # [not win]
    - libtool          # [not win]
    - m4               # [not win]
    - m2-make          # [win]
    - m2-autoconf      # [win]
    - m2-automake-wrapper  # [win]
    - m2-libtool       # [win]
    - m2-m4            # [win]
    - m2-bash          # [win]
    - m2-msys2-runtime # [win]
    - flex=2.6.4       # [not win]
    - bison=3.8.2      # [not win]
    # conda-forge's m2-bison is stuck at the old msys2 epoch and unsolvable;
    # winflexbison (lexxmark/winflexbison) bundles bison 3.7.4 + flex 2.6.4
    # as win_bison.exe / win_flex.exe.
    - winflexbison     # [win]
    - boost=1.85.0
    - yaml-cpp=0.8.0
    - gtest=1.17.0

about:
  home: https://www.wavecruncher.net
  license: LGPL-3.0-only
  license_file: ../../LICENSE
  summary: Verilog Design Flattenner and Obfuscater.

test:
  commands:
    - veriparse -h
    - veriflat -h
    - veriobf -h
