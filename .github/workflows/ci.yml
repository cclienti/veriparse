name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get install -y mold iverilog

      - name: Generate conda environment file
        run: make dev-env-file

      - name: Install micromamba and create environment
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: conda/environment.yml
          environment-name: veriparse-dev
          init-shell: bash
          cache-environment: true

      - name: Configure
        run: make dev-cmake

      - name: Build
        run: make dev-build

      - name: Test (unit + verilator)
        run: make dev-test

      - name: Test (integration)
        run: make dev-test-integration
