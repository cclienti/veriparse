name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Keep the vcpkg binary cache warm (GitHub evicts at 7 days) and catch
    # macOS regressions periodically. Every 5 days gives a 2-day safety margin.
    - cron: '0 6 */5 * *'
  workflow_dispatch:
    inputs:
      include_macos:
        description: 'Also run macOS jobs (osx-64, osx-arm64)'
        type: boolean
        default: false

# Cancel any in-flight run for the same workflow + ref. Force-pushes on a
# PR branch (or rapid pushes to master) auto-cancel the older run instead
# of letting both burn runner minutes in parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Emit the matrix at runtime so macOS entries are omitted on PR runs
  # (macOS runner minutes cost ~10x linux). macOS still runs on push:master,
  # schedule, and when manually requested.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          INCLUDE_MACOS: ${{ github.event_name == 'schedule' || github.event_name == 'push' || github.event.inputs.include_macos == 'true' }}
        run: |
          {
            echo 'matrix<<EOF'
            echo '{"include":['
            echo '{"os":"ubuntu-latest","platform":"linux-64","name":"Linux Ubuntu x86_64","linker":"-fuse-ld=mold","apt":"mold"}'
            if [[ "$INCLUDE_MACOS" == "true" ]]; then
              echo ','
              echo '{"os":"macos-latest","platform":"osx-64","name":"macOS x86_64","linker":"","apt":""},'
              echo '{"os":"macos-14","platform":"osx-arm64","name":"macOS arm64","linker":"","apt":""}'
            fi
            echo ']}'
            echo EOF
          } >> "$GITHUB_OUTPUT"

  # Unix build via the same `make dev-*` flow that local developers use:
  # micromamba bootstraps a conda env from the recipe's deps, then cmake
  # + make + ctest. This is verification only, no packaging (that lives
  # in release.yml).
  build-unix:
    needs: matrix
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install platform tools
        if: matrix.apt != ''
        run: sudo apt-get install -y ${{ matrix.apt }}

      - name: Install micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          init-shell: bash

      - name: Generate conda environment file
        run: make dev-env-file

      - name: Create dev environment
        run: make dev-env

      - name: Configure
        run: make dev-cmake DEV_LINKER_FLAGS="${{ matrix.linker }}"

      - name: Build
        run: make dev-build

      - name: Test (unittest)
        run: make dev-test

      - name: Test (cosim)
        run: make dev-test-cosim

  # Windows build via dev.ps1 — the same PowerShell entry point
  # that local Windows devs use, sharing meta.yaml as the conda source
  # of truth. Dev == IDE == CI.
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          # micromamba 2.6.1 hits ACCESS_VIOLATION on windows-2022; pin.
          micromamba-version: '2.0.5-0'
          init-shell: powershell
          post-cleanup: none

      - name: Create dev environment
        run: .\dev.ps1 env

      - name: Configure
        run: .\dev.ps1 cmake

      - name: Build
        run: .\dev.ps1 build

      - name: Test (unittest)
        run: .\dev.ps1 test
