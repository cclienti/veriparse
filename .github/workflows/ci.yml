name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract conda deps from meta.yaml
        run: |
          deps=$(sed -n '/^requirements:/,/^[^ ]/p' conda/recipe-release/meta.yaml \
                 | sed -n '/^  build:/,/^  [^ ]/p' \
                 | grep '^ *- ' \
                 | grep -v '{{\|compiler\|mold' \
                 | sed 's/^ *- //')
          echo "channels:" > ci-environment.yml
          echo "  - conda-forge" >> ci-environment.yml
          echo "dependencies:" >> ci-environment.yml
          echo "$deps" | sed 's/^/  - /' >> ci-environment.yml

      - name: Install micromamba and create environment
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: ci-environment.yml
          environment-name: veriparse-dev
          init-shell: bash
          cache-environment: true

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake -DVERIPARSE_EXTERNAL_ROOT=$CONDA_PREFIX \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=$HOME/veriparse \
                ..

      - name: Build
        run: make -C build -j$(nproc)

      - name: Test (unit + verilator)
        run: |
          cd build
          VERIPARSE_SOURCE_ROOT=$GITHUB_WORKSPACE \
            ctest -j$(nproc) -L 'unittest|verilator' --output-on-failure

      - name: Test (integration)
        run: |
          cd build
          VERIPARSE_SOURCE_ROOT=$GITHUB_WORKSPACE \
            ctest -j$(nproc) -L integration --output-on-failure
