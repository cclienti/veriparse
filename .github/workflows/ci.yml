name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Keep the vcpkg binary cache warm (GitHub evicts at 7 days) and catch
    # macOS regressions periodically. Every 5 days gives a 2-day safety margin.
    - cron: '0 6 */5 * *'
  workflow_dispatch:
    inputs:
      include_macos:
        description: 'Also run macOS jobs (osx-64, osx-arm64)'
        type: boolean
        default: false

jobs:
  # Emit the matrix at runtime so macOS entries are omitted on PR runs
  # (macOS runner minutes cost ~10x linux). macOS still runs on push:master,
  # schedule, and when manually requested.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          INCLUDE_MACOS: ${{ github.event_name == 'schedule' || github.event_name == 'push' || github.event.inputs.include_macos == 'true' }}
        run: |
          {
            echo 'matrix<<EOF'
            echo '{"include":['
            echo '{"os":"ubuntu-latest","platform":"linux-64","name":"Linux Ubuntu x86_64","linker":"-fuse-ld=mold","apt":"mold iverilog"}'
            if [[ "$INCLUDE_MACOS" == "true" ]]; then
              echo ','
              echo '{"os":"macos-latest","platform":"osx-64","name":"macOS x86_64","linker":"","apt":""},'
              echo '{"os":"macos-14","platform":"osx-arm64","name":"macOS arm64","linker":"","apt":""}'
            fi
            echo ']}'
            echo EOF
          } >> "$GITHUB_OUTPUT"

  # Unix build via the same `make dev-*` flow that local developers use:
  # micromamba bootstraps a conda env from the recipe's deps, then cmake
  # + make + ctest. This is verification only, no packaging (that lives
  # in release.yml).
  build-unix:
    needs: matrix
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install platform tools
        if: matrix.apt != ''
        run: sudo apt-get install -y ${{ matrix.apt }}

      - name: Install micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          init-shell: bash

      - name: Generate conda environment file
        run: make dev-env-file

      - name: Create dev environment
        run: make dev-env

      - name: Configure
        run: make dev-cmake DEV_LINKER_FLAGS="${{ matrix.linker }}"

      - name: Build
        run: make dev-build

      - name: Test (unittest)
        run: make dev-test

      - name: Test (verilator + integration)
        if: matrix.platform == 'linux-64'
        run: make dev-test-integration

  # Windows build via the CMake workflow preset declared in CMakePresets.json.
  # Same single command (`cmake --workflow --preset windows-release`) that a
  # Windows developer runs locally, so dev == CI.
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-2022
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install micromamba + build env
        uses: mamba-org/setup-micromamba@v3
        with:
          # micromamba 2.6.1 hits ACCESS_VIOLATION on windows-2022; pin.
          micromamba-version: '2.0.5-0'
          environment-name: build
          init-shell: bash powershell
          create-args: >-
            cmake
            winflexbison
            libboost-devel=1.90.0
            yaml-cpp=0.8.0
            gtest=1.17.0

      - name: Configure
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -T ClangCL \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$CONDA_PREFIX/Library"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test (unittest)
        env:
          VERIPARSE_SOURCE_ROOT: ${{ github.workspace }}
        run: ctest --test-dir build -j 4 -L unittest --output-on-failure -C Release
