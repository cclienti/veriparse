name: Release - Build Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      include_macos:
        description: 'Also build macOS (osx-64, osx-arm64). Defaults to false to avoid burning expensive macOS minutes during iteration.'
        type: boolean
        default: false
  push:
    branches: [master]

jobs:
  # Emit the matrix at runtime so macOS entries are omitted entirely when
  # not needed. This avoids allocating macOS runners (~10x Linux cost) for
  # iterations where only linux verification is wanted. Windows is built by
  # a separate (cmake + vcpkg + MSVC, zip) job below, not via conda-build.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          INCLUDE_MACOS: ${{ github.event_name == 'release' || github.event.inputs.include_macos == 'true' }}
        run: |
          {
            echo 'matrix<<EOF'
            echo '{"include":['
            echo '{"os":"ubuntu-latest","platform":"linux-64","shell":"bash -el {0}"}'
            if [[ "$INCLUDE_MACOS" == "true" ]]; then
              echo ','
              echo '{"os":"macos-latest","platform":"osx-64","shell":"bash -el {0}"},'
              echo '{"os":"macos-14","platform":"osx-arm64","shell":"bash -el {0}"}'
            fi
            echo ']}'
            echo EOF
          } >> "$GITHUB_OUTPUT"

  # Linux + macOS: build a conda package via conda-build.
  build-conda-package:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          # micromamba 2.6.1 crashes (ACCESS_VIOLATION) during `shell init`
          # on the windows-2022 runner; pin to a known-good version.
          micromamba-version: '2.0.5-0'
          init-shell: bash
          post-cleanup: none

      - name: Build conda package
        run: make package

      - name: Get package filename
        id: pkg
        run: echo "path=$(make package-name)" >> $GITHUB_OUTPUT

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.pkg.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Windows: build directly with MSVC + vcpkg, no conda. The result is a
  # self-contained zip. conda-forge's win-64 ecosystem doesn't ship gmpxx
  # and is MSVC-built while veriparse uses C++ libraries with the same
  # ABI requirement; building via vcpkg keeps the toolchain coherent and
  # iteration friction much lower than the conda-build sandbox.
  build-windows-zip:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # vcpkg doesn't have a flex/bison port; chocolatey ships winflexbison
      # (lexxmark/winflexbison) which provides win_flex.exe + win_bison.exe.
      - name: Install winflexbison
        run: choco install winflexbison3 -y --no-progress

      # vcpkg via the official action: handles bootstrap (clone + build of
      # the vcpkg tool) at the pinned commit. We DISABLE its built-in
      # GHA-cache binary source because vcpkg invoked inside cmake's
      # Configure step doesn't get the ACTIONS_RUNTIME_TOKEN/CACHE_URL env
      # vars that the GHA backend requires.
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Keep in sync with builtin-baseline in vcpkg.json.
          vcpkgGitCommitId: 'b02e341c927f16d991edbd915d8ea43eac52096c'
          vcpkgJsonGlob: 'vcpkg.json'
          # Don't run vcpkg install in this step; cmake's vcpkg integration
          # will do it during configure, picking up the file-based cache.
          runVcpkgInstall: false
          # Force a short root path. Boost's buildtree filenames push past
          # Windows' 260-char MAX_PATH limit when vcpkg lives under the
          # default deep checkout dir (D:\a\veriparse\veriparse\vcpkg\...).
          vcpkgDirectory: 'C:\v'

      # File-based vcpkg binary cache, persisted across runs by actions/cache.
      # Restore before configure (where vcpkg actually runs); save after,
      # always(), so even a failed build still preserves the built ports.
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-win64-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-win64-

      - name: Configure
        env:
          VCPKG_BINARY_SOURCES: 'clear;files,${{ runner.temp }}/vcpkg-cache,readwrite'
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test (unittest)
        env:
          VERIPARSE_SOURCE_ROOT: ${{ github.workspace }}
        run: ctest --test-dir build -j 4 -L unittest --output-on-failure -C Release

      - name: Install
        run: cmake --install build --config Release

      # Save the vcpkg cache even if subsequent steps fail, so the next
      # iteration doesn't re-build every port from scratch.
      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-win64-${{ hashFiles('vcpkg.json') }}

      - name: Compute zip name
        id: zipname
        run: |
          $version = "$(git describe --tags --always --dirty)"
          $name = "veriparse-${version}-win64.zip"
          echo "name=$name" >> $env:GITHUB_OUTPUT

      - name: Zip
        run: Compress-Archive -Path install/* -DestinationPath ${{ steps.zipname.outputs.name }}

      - name: Upload artifact (every run, for download from the run page)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zipname.outputs.name }}
          path: ${{ steps.zipname.outputs.name }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.zipname.outputs.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
