name: Release - Build Conda Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-conda-package:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-64
          - os: macos-latest
            platform: osx-64
          - os: macos-14
            platform: osx-arm64
          - os: windows-latest
            platform: win-64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          init-shell: bash
          micromamba-version: latest
          post-cleanup: none

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: micromamba install -y -c conda-forge make

      - name: Build conda package
        run: make package

      - name: Get package filename
        id: pkg
        run: echo "path=$(make package-name)" >> $GITHUB_OUTPUT

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.pkg.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
