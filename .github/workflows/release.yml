name: Release - Build Conda Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-conda-package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-64
            shell: bash -el {0}
          - os: macos-latest
            platform: osx-64
            shell: bash -el {0}
          - os: macos-14
            platform: osx-arm64
            shell: bash -el {0}
          - os: windows-2022
            platform: win-64
            shell: pwsh

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          init-shell: >-
            ${{ runner.os == 'Windows' && 'powershell' || 'bash' }}
          post-cleanup: none

      - name: Build conda package
        run: make package

      - name: Get package filename
        id: pkg
        run: echo "path=$(make package-name)" >> $GITHUB_OUTPUT

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.pkg.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
