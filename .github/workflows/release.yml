name: Release - Build Conda Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      include_macos:
        description: 'Also build macOS (osx-64, osx-arm64). Defaults to false to avoid burning expensive macOS minutes during iteration.'
        type: boolean
        default: false
  push:
    branches: [master]

jobs:
  # Emit the matrix at runtime so macOS entries are omitted entirely when
  # not needed. This avoids allocating macOS runners (~10x Linux cost) for
  # iterations where only linux+windows verification is wanted.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          INCLUDE_MACOS: ${{ github.event_name == 'release' || github.event.inputs.include_macos == 'true' }}
        run: |
          {
            echo 'matrix<<EOF'
            echo '{"include":['
            echo '{"os":"ubuntu-latest","platform":"linux-64","shell":"bash -el {0}"},'
            echo '{"os":"windows-2022","platform":"win-64","shell":"pwsh"}'
            if [[ "$INCLUDE_MACOS" == "true" ]]; then
              echo ','
              echo '{"os":"macos-latest","platform":"osx-64","shell":"bash -el {0}"},'
              echo '{"os":"macos-14","platform":"osx-arm64","shell":"bash -el {0}"}'
            fi
            echo ']}'
            echo EOF
          } >> "$GITHUB_OUTPUT"

  build-conda-package:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          # micromamba 2.6.1 crashes (ACCESS_VIOLATION) during `shell init`
          # on the windows-2022 runner; pin to a known-good version.
          micromamba-version: '2.0.5-0'
          init-shell: >-
            ${{ runner.os == 'Windows' && 'powershell' || 'bash' }}
          post-cleanup: none

      # vcpkg builds GMP from source (~10+ min on Windows). Cache the binary
      # archives so subsequent runs reuse the built package and complete in
      # seconds. Only relevant on win-64 (Unix gets GMP from conda-forge).
      - name: Cache vcpkg binary archives
        if: matrix.platform == 'win-64'
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: vcpkg-win64-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-win64-

      - name: Build conda package
        run: make package

      - name: Get package filename
        id: pkg
        run: echo "path=$(make package-name)" >> $GITHUB_OUTPUT

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.pkg.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
