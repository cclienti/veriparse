name: Release

# Release workflow: packaging only. Code verification lives in ci.yml.
# Triggered explicitly on a published release, or manually via the Actions UI.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      include_macos:
        description: 'Also build macOS conda packages (osx-64, osx-arm64).'
        type: boolean
        default: true

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          INCLUDE_MACOS: ${{ github.event_name == 'release' || github.event.inputs.include_macos == 'true' }}
        run: |
          {
            echo 'matrix<<EOF'
            echo '{"include":['
            echo '{"os":"ubuntu-latest","platform":"linux-64","shell":"bash -el {0}"}'
            if [[ "$INCLUDE_MACOS" == "true" ]]; then
              echo ','
              echo '{"os":"macos-latest","platform":"osx-64","shell":"bash -el {0}"},'
              echo '{"os":"macos-14","platform":"osx-arm64","shell":"bash -el {0}"}'
            fi
            echo ']}'
            echo EOF
          } >> "$GITHUB_OUTPUT"

  # Linux + macOS: build the conda package via conda-build.
  build-conda-package:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          # micromamba 2.6.1 crashes (ACCESS_VIOLATION) during `shell init`
          # on the windows-2022 runner; pin to a known-good version.
          micromamba-version: '2.0.5-0'
          init-shell: bash
          post-cleanup: none

      - name: Build conda package
        run: make package

      - name: Get package filename
        id: pkg
        run: echo "path=$(make package-name)" >> $GITHUB_OUTPUT

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.pkg.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Windows: build directly with MSVC + vcpkg via the same CMake workflow
  # preset CI uses, then install + zip + upload.
  build-windows-zip:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install winflexbison
        run: choco install winflexbison3 -y --no-progress

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '56bb2411609227288b70117ead2c47585ba07713'
          vcpkgJsonGlob: 'vcpkg.json'
          runVcpkgInstall: false
          vcpkgDirectory: 'C:\v'

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-win64-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-win64-

      - name: Configure + Build + Test
        env:
          VCPKG_BINARY_SOURCES: 'clear;files,${{ runner.temp }}/vcpkg-cache,readwrite'
        run: cmake --workflow --preset windows-release

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-win64-${{ hashFiles('vcpkg.json') }}

      - name: Install
        run: cmake --install build/windows-release --config Release

      - name: Compute zip name
        id: zipname
        run: |
          $version = "$(git describe --tags --always --dirty)"
          $name = "veriparse-${version}-win64.zip"
          echo "name=$name" >> $env:GITHUB_OUTPUT

      - name: Zip
        run: Compress-Archive -Path install/windows-release/* -DestinationPath ${{ steps.zipname.outputs.name }}

      - name: Upload artifact (every run, for download from the run page)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.zipname.outputs.name }}
          path: ${{ steps.zipname.outputs.name }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.zipname.outputs.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
