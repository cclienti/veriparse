name: Release

# Release workflow: packaging only. Code verification lives in ci.yml.
# Triggered explicitly on a published release, or manually via the Actions UI.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      include_macos:
        description: 'Also build macOS conda packages (osx-64, osx-arm64).'
        type: boolean
        default: true
      include_windows:
        description: 'Also build Windows conda package (win-64).'
        type: boolean
        default: true

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          INCLUDE_MACOS: ${{ github.event_name == 'release' || github.event.inputs.include_macos == 'true' }}
          INCLUDE_WINDOWS: ${{ github.event_name == 'release' || github.event.inputs.include_windows == 'true' }}
        run: |
          {
            echo 'matrix<<EOF'
            echo '{"include":['
            echo '{"os":"ubuntu-latest","platform":"linux-64","name":"Linux Ubuntu x86_64","shell":"bash -el {0}","init_shell":"bash"}'
            if [[ "$INCLUDE_MACOS" == "true" ]]; then
              echo ','
              echo '{"os":"macos-latest","platform":"osx-64","name":"macOS x86_64","shell":"bash -el {0}","init_shell":"bash"},'
              echo '{"os":"macos-14","platform":"osx-arm64","name":"macOS arm64","shell":"bash -el {0}","init_shell":"bash"}'
            fi
            if [[ "$INCLUDE_WINDOWS" == "true" ]]; then
              echo ','
              echo '{"os":"windows-latest","platform":"win-64","name":"Windows x86_64","shell":"bash -el {0}","init_shell":"bash powershell"}'
            fi
            echo ']}'
            echo EOF
          } >> "$GITHUB_OUTPUT"

  build-conda-package:
    needs: matrix
    name: Build ${{ matrix.name }} (conda)
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          # micromamba 2.6.1 crashes (ACCESS_VIOLATION) during `shell init`
          # on the windows-2022 runner; pin to a known-good version.
          micromamba-version: '2.0.5-0'
          init-shell: ${{ matrix.init_shell }}
          post-cleanup: none

      # GNU make is pre-installed on ubuntu/macos runners but not on Windows.
      - name: Install GNU make (Windows)
        if: matrix.platform == 'win-64'
        shell: pwsh
        run: choco install make -y --no-progress

      # On Windows, give conda-build short, all-forward-slash paths:
      #   - keeps the work tree out of MAX_PATH territory (default
      #     $HOME/veriparse-conda-bld is long under C:\Users\runneradmin)
      #   - avoids backslash-escape mangling when conda-build's `--output`
      #     path is captured back through make + bash (\U and \r vanish,
      #     turning C:\Users\runneradmin into C:Usersrunneradmin).
      - name: Set Windows conda-build paths
        if: matrix.platform == 'win-64'
        run: |
          echo "CONDA_BUILD_ROOT=C:/b" >> "$GITHUB_ENV"
          echo "CONDA_DEST_PATH=C:/p" >> "$GITHUB_ENV"

      - name: Build conda package
        run: make package

      - name: Get package filename
        id: pkg
        run: echo "path=$(make package-name)" >> $GITHUB_OUTPUT

      - name: Upload artifact (every run, for download from the run page)
        uses: actions/upload-artifact@v6
        with:
          name: veriparse-${{ matrix.platform }}-conda
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.pkg.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
